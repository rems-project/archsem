arch = "x86"
name = "R+po+mfence"
symbolic = ["x", "y"]

# MFENCE prevents store-buffer reordering.
# Thread 0: write x=1, write y=1
# Thread 1: write y=2, MFENCE, read x
# Forbidden: y=2 (thread 1's write won) yet 1:EAX=0 (thread 1 didn't see x=1)

[thread.0]
init = { rcx = "x", rdx = "y" }
code = """
movl $1, (%rcx)
movl $1, (%rdx)
"""

[thread.1]
init = { rcx = "x", rdx = "y" }
code = """
movl $2, (%rdx)
mfence
movl (%rcx), %eax
"""

[final]
expect = "unsat"
assertion = "*y = 2 & 1:rax = 0"
