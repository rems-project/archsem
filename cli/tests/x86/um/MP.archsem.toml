arch = "x86"
name = "MP"

# Message Passing litmus test
# Thread 0: MOV [ECX], 0x1; MOV [EDX], 0x1
# Thread 1: MOV EAX, [EDX]; MOV EBX, [ECX]
# Forbidden under SC: EAX=1, EBX=0

[thread.0.regs]
rip = 0x500
rcx = 0x1100
rdx = 0x1200
rflags = 0x3000

# Thread 0: MOV [ECX],1 (C7 01 01000000) + MOV [EDX],1 (C7 02 01000000)
[[memory]]
addr = 0x500
kind = "code"
step = 1
data = [0xC7, 0x01, 0x01, 0x00, 0x00, 0x00, 0xC7, 0x02, 0x01, 0x00, 0x00, 0x00]

[thread.0]
breakpoints = [0x50c]


[thread.1.regs]
rip = 0x600
rax = 0x0
rbx = 0x0
rcx = 0x1100
rdx = 0x1200
rflags = 0x3000

# Thread 1: MOV EAX,[EDX] (8B 02) + MOV EBX,[ECX] (8B 19)
[[memory]]
addr = 0x600
kind = "code"
step = 1
data = [0x8B, 0x02, 0x8B, 0x19]

[thread.1]
breakpoints = [0x604]


[[memory]]
addr = 0x1100
kind = "data"
step = 8
data = 0

[[memory]]
addr = 0x1200
kind = "data"
step = 8
data = 0


# TSO allows: (0,0), (0,1), (1,1) but NOT (1,0)
[final]
kind = "notexists"
assertion.and = [{"1:rax"=0},{"1:rbx"=1}]
