arch = "x86"
name = "IRIW"
symbolic = ["x", "y"]

# Independent Reads of Independent Writes (4 threads)
# Thread 0: MOV [ECX], 0x1        (write x=1)
# Thread 1: MOV EAX, [ECX];       (read x)
#           MOV EBX, [EDX]        (read y)
# Thread 2: MOV [EDX], 0x1        (write y=1)
# Thread 3: MOV EAX, [EDX];       (read y)
#           MOV EBX, [ECX]        (read x)
#
# TSO is multi-copy atomic, so the forbidden outcome
#   1:EAX=1, 1:EBX=0, 3:EAX=1, 3:EBX=0
# (both readers see "their" write but not the other) cannot occur.

[thread.0]
init = { RCX = "x" }
code = """
movl $1, (%rcx)
"""

[thread.1]
init = { RCX = "x", RDX = "y" }
code = """
movl (%rcx), %eax
movl (%rdx), %ebx
"""

[thread.2]
init = { RDX = "y" }
code = """
movl $1, (%rdx)
"""

[thread.3]
init = { RCX = "x", RDX = "y" }
code = """
movl (%rdx), %eax
movl (%rcx), %ebx
"""

[final]
expect = "unsat"
assertion = "1:RAX = 1 & 1:RBX = 0 & 3:RAX = 1 & 3:RBX = 0"
