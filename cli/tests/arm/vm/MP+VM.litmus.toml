arch = "AArch64"
name = "MP+VM"
symbolic = ["x", "y"]

page_table_setup = """
x |-> pa_x;
y |-> pa_y;
x ?-> pa_y;
"""

[thread.0]
init = { X0 = "pte3(x, page_table_base)", X1 = "x", X2 = "desc3(x, page_table_base)", X3 = "y", X4 = "mkdesc3(oa=pa_y, Valid=0b0, AF=0b0, AP=0b11, DBM=0b1)", TTBR0_EL1 = "page_table_base", SCTLR_EL1 = 1, CurrentEL = 1 }
code = """
	STR X0,[X1]
	STR X2,[X3]
"""

[thread.1]
init = { X1 = "y", X3 = "x", TTBR0_EL1 = "page_table_base", SCTLR_EL1 = 1, CurrentEL = 1 }
code = """
	LDR X0,[X1]
	LDR X2,[X3]
"""

[final]
expect = "sat"
assertion = "1:X0 = 0x6443 & 1:X2 = 0 & *pa_x = 0x9018 & 0:X4 = 0x800000000a0c2"
