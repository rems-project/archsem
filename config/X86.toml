arch = "X86"

[assembler]
assemble = "llvm-mc -triple=x86_64 --assemble --filetype=obj"
extract = "llvm-objcopy -O binary"
instruction_step = 1

[isla]
default_memory_size = 8
page_bits = 12

[isla.symbols]
base_address = 0x500

[execution]
fuel = 1000

[registers.defaults]
RAX = 0
RCX = 0
RDX = 0
RBX = 0
RSP = 0
RBP = 0
RSI = 0
RDI = 0
R8 = 0
R9 = 0
R10 = 0
R11 = 0
R12 = 0
R13 = 0
R14 = 0
R15 = 0
RFLAGS = 0

[isla.register_renames]
rax = "RAX"
rbx = "RBX"
rcx = "RCX"
rdx = "RDX"
rsp = "RSP"
rbp = "RBP"
rsi = "RSI"
rdi = "RDI"
r8  = "R8"
r9  = "R9"
r10 = "R10"
r11 = "R11"
r12 = "R12"
r13 = "R13"
r14 = "R14"
r15 = "R15"
