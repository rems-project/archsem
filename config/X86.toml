arch = "X86"

[assembler]
assemble = "llvm-mc -triple=x86_64 --assemble --filetype=obj"
extract = "llvm-objcopy -O binary"
instruction_step = 1

[isla]
default_memory_size = 8
page_bits = 12

[isla.symbols]
base_address = 0x500

[execution]
fuel = 1000

[registers.defaults]
rax = 0
rcx = 0
rdx = 0
rbx = 0
rsp = 0
rbp = 0
rsi = 0
rdi = 0
r8 = 0
r9 = 0
r10 = 0
r11 = 0
r12 = 0
r13 = 0
r14 = 0
r15 = 0
rflags = 0

[isla.register_renames]
rax = "rax"
rbx = "rbx"
rcx = "rcx"
rdx = "rdx"
rsp = "rsp"
rbp = "rbp"
rsi = "rsi"
rdi = "rdi"
r8  = "r8"
r9  = "r9"
r10 = "r10"
r11 = "r11"
r12 = "r12"
r13 = "r13"
r14 = "r14"
r15 = "r15"
